<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحميل القرآن الكريم</title>
</head>
<body>
    <h1>موقع تحميل ملفات MP3</h1>
    
    <a href="https://server8.mp3quran.net/frs_a/114.mp3" download>تحميل السورة رقم 114</a>
    
    <br><br>
    
    <button onclick="downloadAll()">تحميل 114 سورة دفعة واحدة</button>

    <script>
        function downloadAll() {
            // التنسيق: من 001 إلى 114
            for (let i = 1; i <= 114; i++) {
                // تحويل الرقم إلى تنسيق 3 خانات (مثل 001، 010، 114)
                let number = i.toString().padStart(3, '0');
                let url = `https://server8.mp3quran.net/frs_a/${number}.mp3`;
                
                // إنشاء رابط مخفي والضغط عليه
                let link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', '');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
