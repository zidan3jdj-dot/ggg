<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل القرآن الكريم MP3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1a2a3a;
            font-size: 32px;
            margin-bottom: 10px;
        }

        h1 span {
            color: #2ecc71;
        }

        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            color: #666;
        }

        .tab-btn.active {
            background: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46,204,113,0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 14px;
            font-family: monospace;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2ecc71;
        }

        .download-btn {
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .download-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .download-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            height: 30px;
        }

        .progress-fill {
            background: #2ecc71;
            width: 0%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            transition: width 0.3s;
        }

        .sura-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
            padding: 5px;
        }

        .sura-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .sura-card:hover {
            background: #e8f5e9;
            transform: translateX(-3px);
        }

        .sura-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sura-num {
            background: #2ecc71;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .sura-name {
            font-weight: bold;
            font-size: 14px;
        }

        .btn-small {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-small:hover {
            background: #27ae60;
        }

        .batch-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .batch-btn {
            flex: 1;
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .batch-btn:hover {
            background: #2980b9;
        }

        .message {
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-right: 4px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-right: 4px solid #dc3545;
        }

        .stats {
            background: #f0f7f0;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📖 تحميل القرآن الكريم <span>MP3</span></h1>
            <div class="sub">تحميل مباشر لسور القرآن بصوت أشهر القراء</div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('single')">🎵 تحميل فردي</button>
                <button class="tab-btn" onclick="switchTab('batch')">📦 تحميل جماعي</button>
            </div>

            <!-- التحميل الفردي -->
            <div id="singleTab">
                <div class="input-group">
                    <label>🔗 رابط السورة (MP3):</label>
                    <input type="text" id="singleUrl" placeholder="مثال: https://server8.mp3quran.net/frs_a/001.mp3" dir="ltr">
                </div>
                <div class="batch-actions">
                    <button class="batch-btn" onclick="setExample('frs_a')">🎙️ سعد الشريم</button>
                    <button class="batch-btn" onclick="setExample('afs_ahmad')">🎙️ أحمد العفاسي</button>
                    <button class="batch-btn" onclick="setExample('h_aabdulaziz')">🎙️ أحمد العجمي</button>
                </div>
                <button class="download-btn" onclick="downloadSingle()">⬇️ تحميل MP3</button>
            </div>

            <!-- التحميل الجماعي -->
            <div id="batchTab" style="display: none;">
                <div class="input-group">
                    <label>🎙️ اختر القارئ:</label>
                    <select id="qariSelect" onchange="selectQari()">
                        <option value="">-- اختر القارئ --</option>
                        <option value="https://server8.mp3quran.net/frs_a/">سعد الشريم</option>
                        <option value="https://server8.mp3quran.net/afs_ahmad/">أحمد العفاسي</option>
                        <option value="https://server8.mp3quran.net/h_aabdulaziz/">أحمد العجمي</option>
                        <option value="https://server8.mp3quran.net/m_alafasy/">مشاري العفاسي</option>
                        <option value="https://server8.mp3quran.net/s_staweel/">سعود الشريم</option>
                        <option value="https://server8.mp3quran.net/y_sahl/">ياسر الدوسري</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>📊 نطاق السور:</label>
                    <select id="suraRange">
                        <option value="1-114">جميع السور (1-114)</option>
                        <option value="1-30">السور 1 - 30</option>
                        <option value="31-60">السور 31 - 60</option>
                        <option value="61-90">السور 61 - 90</option>
                        <option value="91-114">السور 91 - 114</option>
                    </select>
                </div>
                <button class="download-btn" id="batchDownloadBtn" onclick="startBatchDownload()">📥 بدء التحميل الجماعي</button>
                
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill">0%</div>
                    </div>
                    <div class="stats" id="downloadStats"></div>
                </div>
            </div>

            <div id="message" class="message"></div>
        </div>

        <!-- قائمة السور -->
        <div class="card" id="suraListCard" style="display: none;">
            <h3 style="margin-bottom: 15px;">📜 سور القارئ المختار</h3>
            <div id="suraGrid" class="sura-grid"></div>
        </div>

        <footer>
            💡 التحميل الجماعي: سيتم تحميل كل سورة على حدة (ملفات منفصلة)<br>
            📌 المتصفح قد يطلب تأكيد لكل تحميل - يمكنك السماح بالتحميلات المتعددة
        </footer>
    </div>

    <script>
        // أسماء السور كاملة
        const suraNames = [
            "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس",
            "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه",
            "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم",
            "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر",
            "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق",
            "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة",
            "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج",
            "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس",
            "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد",
            "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات",
            "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر",
            "المسد", "الإخلاص", "الفلق", "الناس"
        ];

        let currentBaseUrl = '';
        let isDownloading = false;

        function switchTab(tab) {
            const singleTab = document.getElementById('singleTab');
            const batchTab = document.getElementById('batchTab');
            const buttons = document.querySelectorAll('.tab-btn');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'single') {
                singleTab.style.display = 'block';
                batchTab.style.display = 'none';
            } else {
                singleTab.style.display = 'none';
                batchTab.style.display = 'block';
            }
            
            document.getElementById('message').style.display = 'none';
        }

        function setExample(qari) {
            document.getElementById('singleUrl').value = `https://server8.mp3quran.net/${qari}/001.mp3`;
        }

        function selectQari() {
            const select = document.getElementById('qariSelect');
            currentBaseUrl = select.value;
            
            if (currentBaseUrl) {
                displaySuraList(currentBaseUrl);
            } else {
                document.getElementById('suraListCard').style.display = 'none';
            }
        }

        async function displaySuraList(baseUrl) {
            const card = document.getElementById('suraListCard');
            const grid = document.getElementById('suraGrid');
            
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            grid.innerHTML = '<div style="text-align:center;padding:20px">🔄 جاري التحقق من السور...</div>';
            card.style.display = 'block';
            
            let found = 0;
            let html = '';
            
            for (let i = 1; i <= 114; i++) {
                const num = i.toString().padStart(3, '0');
                const url = `${baseUrl}${num}.mp3`;
                
                try {
                    const response = await fetch(url, { method: 'HEAD', mode: 'no-cors' });
                    // no-cors لا يعطينا نتيجة مؤكدة، لذلك نفترض وجود الملف
                    found++;
                    html += `
                        <div class="sura-card">
                            <div class="sura-info">
                                <div class="sura-num">${i}</div>
                                <div class="sura-name">${suraNames[i-1]}</div>
                            </div>
                            <button class="btn-small" onclick="downloadSura('${url}', '${num} - ${suraNames[i-1]}.mp3')">
                                ⬇️ تحميل
                            </button>
                        </div>
                    `;
                } catch(e) {
                    // في حالة الخطأ، نعتبر الملف غير موجود
                }
            }
            
            if (found === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:20px;color:#999">⚠️ لا يمكن التحقق من السور (سيتم تحميل كل المحاولات)</div>';
                // إظهار جميع السور على أي حال
                html = '';
                for (let i = 1; i <= 114; i++) {
                    const num = i.toString().padStart(3, '0');
                    const url = `${baseUrl}${num}.mp3`;
                    html += `
                        <div class="sura-card">
                            <div class="sura-info">
                                <div class="sura-num">${i}</div>
                                <div class="sura-name">${suraNames[i-1]}</div>
                            </div>
                            <button class="btn-small" onclick="downloadSura('${url}', '${num} - ${suraNames[i-1]}.mp3')">
                                ⬇️ تحميل
                            </button>
                        </div>
                    `;
                }
            }
            
            grid.innerHTML = html;
        }

        function downloadSura(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            showMessage(`✅ بدأ تحميل: ${filename}`, 'success');
        }

        function downloadSingle() {
            const url = document.getElementById('singleUrl').value.trim();
            if (!url) {
                showMessage('الرجاء إدخال رابط MP3', 'error');
                return;
            }
            
            let filename = url.split('/').pop();
            if (!filename.includes('.mp3')) filename += '.mp3';
            
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            showMessage(`✅ جاري تحميل: ${filename}`, 'success');
        }

        async function startBatchDownload() {
            if (isDownloading) {
                showMessage('يوجد تحميل قيد التشغيل حالياً', 'error');
                return;
            }
            
            let baseUrl = currentBaseUrl;
            if (!baseUrl) {
                const select = document.getElementById('qariSelect');
                baseUrl = select.value;
                if (!baseUrl) {
                    showMessage('الرجاء اختيار قارئ أولاً', 'error');
                    return;
                }
            }
            
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            const range = document.getElementById('suraRange').value;
            const [start, end] = range.split('-').map(Number);
            
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const statsDiv = document.getElementById('downloadStats');
            const batchBtn = document.getElementById('batchDownloadBtn');
            
            progressContainer.style.display = 'block';
            batchBtn.disabled = true;
            isDownloading = true;
            
            let completed = 0;
            let successCount = 0;
            const total = end - start + 1;
            
            statsDiv.innerHTML = `جاري التحميل: 0 / ${total}`;
            
            for (let i = start; i <= end; i++) {
                const num = i.toString().padStart(3, '0');
                const url = `${baseUrl}${num}.mp3`;
                const filename = `${num} - ${suraNames[i-1]}.mp3`;
                
                try {
                    // استخدام iframe أو نافذة جديدة للتحميل
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    link.click();
                    successCount++;
                    
                    // تأخير بسيط بين التحميلات لتجنب حظر المتصفح
                    await new Promise(resolve => setTimeout(resolve, 500));
                    
                } catch(e) {
                    console.log(`فشل تحميل: ${filename}`);
                }
                
                completed++;
                const percent = (completed / total) * 100;
                progressFill.style.width = `${percent}%`;
                progressFill.textContent = `${Math.round(percent)}%`;
                statsDiv.innerHTML = `✅ تم التحميل: ${successCount} / ${total} سورة`;
            }
            
            progressFill.style.width = '100%';
            progressFill.textContent = '100%';
            statsDiv.innerHTML += `<br>🎉 اكتمل تحميل ${successCount} سورة!`;
            
            setTimeout(() => {
                progressContainer.style.display = 'none';
                progressFill.style.width = '0%';
                batchBtn.disabled = false;
                isDownloading = false;
            }, 3000);
            
            showMessage(`✅ اكتمل تحميل ${successCount} سورة`, 'success');
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = text;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 4000);
        }

        // تفعيل Enter في الحقول
        document.getElementById('singleUrl')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') downloadSingle();
        });
    </script>
</body>
</html>
